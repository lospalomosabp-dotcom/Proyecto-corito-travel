<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña</title>
</head>
<body>
    <div class="cambioContrasena">

        <button>Volver atrás</button>

        <figure>
            <img src="imagenes/Imagen-Inicio.png" alt="">
        </figure>

        <h1>Cambia tu Contraseña</h1>
        <form action="">

            <label for="contrasenaActual">Contraseña Actual:</label>
            <input type="password" id="contrasenaActual" name="contrasenaActual" required>

            <label for="nuevaContrasena">Nueva Contraseña:</label>
            <input type="password" id="nuevaContrasena" name="nuevaContrasena" required>

            <label for="confirmarContrasena">Confirmar Nueva Contraseña:</label>
            <input type="password" id="confirmarContrasena" name="confirmarContrasena" required>

            <button type="submit">Cambiar Contraseña</button>

        </form>
    </div>


    
</body>
</html>
