<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña</title>
    <meta name="descripcion" content="agencia de viajes, voletos aereos,tours,reservas...">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="js/iniciosesion.js"></script>




</head>

<body>
    <!--Menu de  Navegacion  -->
    <main class="main-restablecer">
        <!-- Formulario -->
        <form action="" class="formulario-cuenta-restablecer">
            <!--Menu de  Navegacion  -->
            <nav class="direccional">
                <a href="iniciosesion.html"><i class="fa-sharp fa-solid fa-arrow-left"></i></a>
            </nav>
            <!-- imagen logo -->
            <figcaption class="logo">
                <img src="imagenes/logo-agencia.png" alt="logo" width="300" height="200">
            </figcaption>
            <!-- Introducir datos -->
            <h1 class="restablecer-contraseña"> Restablece tu contraseña</h1>
            <p class="subtitulo">Te eviaremos un codigo para restablecer tu contraseña si ya tienes una cuenta.</p>

            <div class="introducir-correo">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="Ingrese su correo electronico">
            </div>
            <!-- Boton enviar codigo -->
            <div class="enviar-codigo">
               <input type="submit" value="Enviar Codigo"> 
            </div>
        </form>
    </main>
</body>

</html>
